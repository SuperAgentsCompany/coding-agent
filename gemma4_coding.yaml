apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
    run.googleapis.com/maxScale: '1'
    run.googleapis.com/gpu-zonal-redundancy-disabled: 'true'
    run.googleapis.com/urls: '["https://gemma4-coding-762452591869.us-central1.run.app"]'
  labels:
    cloud.googleapis.com/location: us-central1
  name: gemma4-coding
  namespace: '762452591869'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '1'
        run.googleapis.com/client-name: gcloud
        run.googleapis.com/client-version: 560.0.0
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/gpu-zonal-redundancy-disabled: 'true'
        run.googleapis.com/startup-cpu-boost: 'true'
      labels:
        client.knative.dev/nonce: ywqpwdkdoh
        run.googleapis.com/startupProbeType: Custom
    spec:
      containerConcurrency: 64
      containers:
      - args:
        - serve
        - gs://super-power-agents-model-cache/models/gemma4-coding-merged
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --generation-config=auto
        - --enable-auto-tool-choice
        - --tool-call-parser=gemma4
        - --dtype=bfloat16
        - --max-num-seqs=64
        - --gpu-memory-utilization=0.95
        - --load-format=runai_streamer
        - --tensor-parallel-size=1
        - --port=8080
        - --host=0.0.0.0
        command:
        - vllm
        image: us-docker.pkg.dev/vertex-ai/vertex-vision-model-garden-dockers/pytorch-vllm-serve:gemma4
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: '20'
            memory: 80Gi
            nvidia.com/gpu: '1'
        startupProbe:
          failureThreshold: 45
          initialDelaySeconds: 60
          periodSeconds: 60
          tcpSocket:
            port: 8080
          timeoutSeconds: 60
      nodeSelector:
        run.googleapis.com/accelerator: nvidia-rtx-pro-6000
      serviceAccountName: 762452591869-compute@developer.gserviceaccount.com
      timeoutSeconds: 1200
  traffic:
  - latestRevision: true
    percent: 100
